<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Among Us 役職・用語図鑑</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1f22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
    <style>
        :root {
            --bg-color: #1e1f22;
            --container-bg: #2b2d31;
            --text-color: #dbdee1;
            --text-muted: #949ba4;
            --accent-blue: #5865f2;
            --accent-blue-hover: #4752c4;
            --border-color: #3f4147;
            
            /* 陣営カラー */
            --crewmate-color: #2ecc71;
            --impostor-color: #e74c3c;
            --neutral-color: #e67e22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: var(--container-bg);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* 👑 ナビゲーションタブ */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: bold;
            padding: 8px 16px;
            cursor: pointer;
            transition: color 0.2s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn:hover {
            color: #fff;
        }

        .tab-btn.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        /* コンテンツエリアの表示切り替え */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 検索・フィルターエリア */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--accent-blue);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn.active[data-camp="all"] { background-color: #72767d; color: #fff; }
        .btn.active[data-camp="crewmate"] { background-color: var(--crewmate-color); color: #fff; border-color: var(--crewmate-color); }
        .btn.active[data-camp="impostor"] { background-color: var(--impostor-color); color: #fff; border-color: var(--impostor-color); }
        .btn.active[data-camp="neutral"] { background-color: var(--neutral-color); color: #fff; border-color: var(--neutral-color); }

        /* 役職リストエリア */
        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .job-card {
            background-color: var(--bg-color);
            border-radius: 6px;
            padding: 20px;
            border-left: 5px solid #72767d;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .job-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .job-card.crewmate { border-left-color: var(--crewmate-color); }
        .job-card.impostor { border-left-color: var(--impostor-color); }
        .job-card.neutral { border-left-color: var(--neutral-color); }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .job-name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }

        .camp-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: bold;
            color: #fff;
        }

        .camp-badge.crewmate { background-color: var(--crewmate-color); }
        .camp-badge.impostor { background-color: var(--impostor-color); }
        .camp-badge.neutral { background-color: var(--neutral-color); }

        .job-desc {
            font-size: 14px;
            white-space: pre-wrap;
            color: #dbdee1;
            word-break: break-all;
        }

        /* カスタム絵文字のスタイル */
        .discord-emoji {
            display: inline-block;
            vertical-align: text-bottom;
            height: 1.3em;
            margin: 0 2px;
        }

        /* 👑 用語集のスタイル */
        .term-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .term-card {
            background-color: var(--bg-color);
            padding: 20px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .term-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-blue);
            margin-bottom: 8px;
        }

        .term-desc {
            font-size: 14px;
            color: #dbdee1;
            white-space: pre-wrap;
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 40px;
            color: var(--text-muted);
        }

        .error-message {
            background-color: rgba(231, 76, 60, 0.2);
            border: 1px solid var(--impostor-color);
            color: #ff8578;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Among Us 役職・用語図鑑</h1>
        <p>TOHKjobs.json のデータと基本用語をまとめています</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('jobs')">役職図鑑</button>
        <button class="tab-btn" onclick="switchTab('terms')">用語図鑑</button>
    </div>

    <div id="error-container" class="error-message"></div>

    <div id="tab-jobs" class="tab-content active">
        <div class="controls">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="役職名やキーワードで検索...">
            </div>
            <div class="filter-buttons">
                <button class="btn active" data-camp="all">すべて</button>
                <button class="btn" data-camp="crewmate">クルー陣営</button>
                <button class="btn" data-camp="impostor">インポスター陣営</button>
                <button class="btn" data-camp="neutral">第三陣営</button>
            </div>
        </div>
        <div class="job-grid" id="job-grid"></div>
    </div>

    <div id="tab-terms" class="tab-content">
        <div class="term-list" id="term-list">
            </div>
    </div>
</div>

<script>
    // 🌟 絵文字の名前とIDの対応表
    const EMOJI_MAP = {
        "Acid": "1517694175288492134",
        "Stage3DeadBody": "1517694782560800818",
        "Shapeshifter": "1466792596037701736",
        "EmergencyButton": "1517693679324762294",
        "Kill": "1466447883816407082",
        "phantom": "1517692922722652261"
    };

    // 👑 特殊用語の解説データ（ここを編集して増やせます！）
    const TERMS_DATA = [
        {
            name: "キルフラッシュ",
            desc: "誰かがキルされた瞬間に、画面が一瞬パッと光る現象のこと。シーアなどの一部役職が持つ能力で、これによってリアルタイムに「今、誰かが死んだ」ことを察知できます。"
        },
        {
            name: "サイドキック / ジャッカルドール",
            desc: "人外陣営（インポスターやジャッカルなど）のスキルによって、ゲーム途中で別陣営から自分の味方に引き入れられた（寝返らせた）プレイヤーのこと。元々の役職から能力が変わったり、主人がデスした際に昇格したりします。"
        },
        {
            name: "確白（かくしろ）",
            desc: "「確実に白（クルー）」であることが全員または特定のプレイヤーから証明されている状態。スキャンタスクなどの視覚タスクをみんなの前でこなしたり、役職の性質（エクスプレスなど）から人外ではないと確定している人を指します。"
        },
        {
            name: "サボタージュ",
            desc: "インポスター陣営が引き起こす嫌がらせ・妨害工作（停電、リアクター、酸素枯渇など）のこと。クルーはこれを制限時間内に修理しないと敗北してしまうものもあります。"
        },
        {
            name: "単独勝利",
            desc: "第三陣営（neutral）の一部が持つ勝利条件。クルーやインポスターが全滅する前に、自分に課せられた特殊な目標（追放される、油を全員に塗る、死体を3回食べるなど）を達成することで、他陣営を差し置いて1人でゲームに勝利します。"
        }
    ];

    const campNames = {
        crewmate: "クルー陣営",
        impostor: "インポスター陣営",
        neutral: "第三陣営"
    };

    let allJobs = [];
    let currentFilter = 'all';
    let currentSearch = '';

    const jobGrid = document.getElementById('job-grid');
    const searchInput = document.getElementById('search-input');
    const filterButtons = document.querySelectorAll('.filter-buttons .btn');
    const errorContainer = document.getElementById('error-container');

    // JSONデータの読み込み
    fetch('TOHKjobs.json')
        .then(response => {
            if (!response.ok) {
                throw new Error('TOHKjobs.json が見つからないか、読み込めませんでした。同じフォルダにファイルがあるか確認してください。');
            }
            return response.json();
        })
        .then(data => {
            for (const [camp, jobs] of Object.entries(data)) {
                for (const [jobName, jobDesc] of Object.entries(jobs)) {
                    allJobs.push({
                        name: jobName,
                        camp: camp,
                        desc: jobDesc
                    });
                }
            }
            renderJobs();
            renderTerms(); // 用語集もついでに生成
        })
        .catch(error => {
            errorContainer.textContent = error.message;
            errorContainer.style.display = 'block';
            console.error(error);
        });

    // 🌟 名前だけのプレースホルダーを画像タグに置換する関数（対応表ver）
    function parseDiscordEmojis(text) {
        let escaped = escapeHtml(text);
        const placeholderRegex = /:([a-zA-Z0-9_]+):/g;

        escaped = escaped.replace(placeholderRegex, (match, name) => {
            const id = EMOJI_MAP[name];
            if (id) {
                return `<img class="discord-emoji" src="https://cdn.discordapp.com/emojis/${id}.png" alt=":${name}:" title="${name}">`;
            }
            return `:${name}:`;
        });

        return escaped;
    }

    // 役職カードの描画
    function renderJobs() {
        jobGrid.innerHTML = '';

        const filteredJobs = allJobs.filter(job => {
            const matchesCamp = currentFilter === 'all' || job.camp === currentFilter;
            const matchesSearch = job.name.toLowerCase().includes(currentSearch.toLowerCase()) || 
                                  job.desc.toLowerCase().includes(currentSearch.toLowerCase());
            return matchesCamp && matchesSearch;
        });

        if (filteredJobs.length === 0) {
            jobGrid.innerHTML = '<div class="no-results">該当する役職が見つかりませんでした。</div>';
            return;
        }

        filteredJobs.forEach(job => {
            const card = document.createElement('div');
            card.className = `job-card ${job.camp}`;

            const htmlDesc = parseDiscordEmojis(job.desc);

            card.innerHTML = `
                <div class="job-header">
                    <span class="job-name">${escapeHtml(job.name)}</span>
                    <span class="camp-badge ${job.camp}">${campNames[job.camp] || job.camp}</span>
                </div>
                <div class="job-desc">${htmlDesc}</div>
            `;
            jobGrid.appendChild(card);
        });
    }

    // 👑 用語集カードの描画
    function renderTerms() {
        const termList = document.getElementById('term-list');
        termList.innerHTML = '';

        TERMS_DATA.forEach(term => {
            const card = document.createElement('div');
            card.className = 'term-card';
            card.innerHTML = `
                <div class="term-name">🔹 ${escapeHtml(term.name)}</div>
                <div class="term-desc">${parseDiscordEmojis(term.desc)}</div>
            `;
            termList.appendChild(card);
        });
    }

    // 👑 タブ切り替えロジック
    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

        if(tabName === 'jobs') {
            document.querySelector('.tab-btn[onclick="switchTab(\'jobs\')"]').classList.add('active');
            document.getElementById('tab-jobs').classList.add('active');
        } else {
            document.querySelector('.tab-btn[onclick="switchTab(\'terms\')"]').classList.add('active');
            document.getElementById('tab-terms').classList.add('active');
        }
    }

    searchInput.addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderJobs();
    });

    filterButtons.forEach(button => {
        button.addEventListener('click', () => {
            filterButtons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            currentFilter = button.getAttribute('data-camp');
            renderJobs();
        });
    });

    function escapeHtml(str) {
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
